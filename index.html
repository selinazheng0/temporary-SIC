      <script>
const container = document.querySelector('.spawn-container');

const images = [
  'images/red/phones.png',
  'images/red/canal.png',
  'images/red/blockprint.png',
  'images/red/terracotts.png',
  'images/red/putian.png',
  'images/red/endlessgarment.png',
  'images/red/SA_market_6.png',
];

function spawnImage(src, delay = 0) {
  const img = document.createElement('img');
  img.src = src;
  img.classList.add('spawned-img');

  let active = true;

  container.appendChild(img);

  function cycle() {
    if (!active) return;

    // random position
    img.style.top = Math.random() * 80 + '%';
    img.style.left = Math.random() * 80 + '%';

    // trigger animation (fade in)
    setTimeout(() => {
      if (!active) return;
      img.classList.remove('hide');
      img.classList.add('show');
    }, 10);

    // stay visible, then fade out
    setTimeout(() => {
      if (!active) return;

      img.classList.remove('show');
      img.classList.add('hide');

      // after fade, repeat cycle
      setTimeout(() => {
        if (!active) return;
        cycle();
      }, 1000); // matches CSS transition

    }, 3000); // visible duration (you had 5000)
  }

  // start cycle after delay
  setTimeout(cycle, delay);

  // stop on click
  img.addEventListener('click', () => {
    active = false;
    img.remove();
  });
}

// spawn all on load (same structure as yours)
window.addEventListener('load', () => {
  images.forEach((src, i) => {
    setTimeout(() => spawnImage(src, i * 400));
  });
});
